<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="BookMyShow Monitor — instant WhatsApp alerts when new shows open">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1224"/>
      <stop offset="0.55" stop-color="#1b1f3d"/>
      <stop offset="1" stop-color="#3c1c33"/>
    </linearGradient>
    <linearGradient id="ticket" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f84464"/>
      <stop offset="1" stop-color="#ff7a59"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="320" rx="16" fill="url(#bg)"/>

  <!-- film-strip strip along the bottom -->
  <g fill="#ffffff" opacity="0.08">
    <rect x="0" y="286" width="1200" height="34"/>
  </g>
  <g fill="#0e1224">
    <rect x="18"  y="294" width="26" height="18" rx="3" opacity="0.9"/>
    <rect x="66"  y="294" width="26" height="18" rx="3" opacity="0.9"/>
    <rect x="114" y="294" width="26" height="18" rx="3" opacity="0.9"/>
    <rect x="162" y="294" width="26" height="18" rx="3" opacity="0.9"/>
    <rect x="210" y="294" width="26" height="18" rx="3" opacity="0.9"/>
    <rect x="258" y="294" width="26" height="18" rx="3" opacity="0.9"/>
    <rect x="306" y="294" width="26" height="18" rx="3" opacity="0.9"/>
    <rect x="354" y="294" width="26" height="18" rx="3" opacity="0.9"/>
    <rect x="402" y="294" width="26" height="18" rx="3" opacity="0.9"/>
    <rect x="450" y="294" width="26" height="18" rx="3" opacity="0.9"/>
    <rect x="498" y="294" width="26" height="18" rx="3" opacity="0.9"/>
    <rect x="546" y="294" width="26" height="18" rx="3" opacity="0.9"/>
    <rect x="594" y="294" width="26" height="18" rx="3" opacity="0.9"/>
    <rect x="642" y="294" width="26" height="18" rx="3" opacity="0.9"/>
    <rect x="690" y="294" width="26" height="18" rx="3" opacity="0.9"/>
    <rect x="738" y="294" width="26" height="18" rx="3" opacity="0.9"/>
    <rect x="786" y="294" width="26" height="18" rx="3" opacity="0.9"/>
    <rect x="834" y="294" width="26" height="18" rx="3" opacity="0.9"/>
    <rect x="882" y="294" width="26" height="18" rx="3" opacity="0.9"/>
    <rect x="930" y="294" width="26" height="18" rx="3" opacity="0.9"/>
    <rect x="978" y="294" width="26" height="18" rx="3" opacity="0.9"/>
    <rect x="1026" y="294" width="26" height="18" rx="3" opacity="0.9"/>
    <rect x="1074" y="294" width="26" height="18" rx="3" opacity="0.9"/>
    <rect x="1122" y="294" width="26" height="18" rx="3" opacity="0.9"/>
    <rect x="1170" y="294" width="26" height="18" rx="3" opacity="0.9"/>
  </g>

  <!-- ticket icon -->
  <g transform="translate(78 84) rotate(-6 90 60)">
    <rect x="0" y="0" width="180" height="112" rx="14" fill="url(#ticket)"/>
    <!-- perforation notches -->
    <circle cx="0" cy="56" r="13" fill="#141833"/>
    <circle cx="180" cy="56" r="13" fill="#141833"/>
    <!-- tear line -->
    <line x1="126" y1="10" x2="126" y2="102" stroke="#ffffff" stroke-opacity="0.65" stroke-width="3" stroke-dasharray="4 8" stroke-linecap="round"/>
    <!-- "seat rows" -->
    <rect x="20" y="26" width="72" height="9" rx="4.5" fill="#ffffff" opacity="0.92"/>
    <rect x="20" y="46" width="54" height="9" rx="4.5" fill="#ffffff" opacity="0.75"/>
    <rect x="20" y="66" width="64" height="9" rx="4.5" fill="#ffffff" opacity="0.6"/>
    <!-- stub star -->
    <path d="M153 44 l5.2 10.6 11.6 1.7 -8.4 8.2 2 11.6 -10.4 -5.5 -10.4 5.5 2 -11.6 -8.4 -8.2 11.6 -1.7 z" fill="#ffffff" opacity="0.95"/>
  </g>

  <!-- alert dot on the ticket -->
  <circle cx="264" cy="86" r="17" fill="#25D366"/>
  <circle cx="264" cy="86" r="17" fill="none" stroke="#ffffff" stroke-opacity="0.85" stroke-width="3"/>
  <path d="M256.5 86.5 l5 5 l9.5 -10" fill="none" stroke="#ffffff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- title -->
  <text x="320" y="136" font-family="'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif" font-size="58" font-weight="700" fill="#ffffff" letter-spacing="0.5">BookMyShow Monitor</text>

  <!-- subtitle -->
  <text x="322" y="180" font-family="'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif" font-size="24" fill="#b7bdda">Instant WhatsApp alerts when new shows, theatres or seats open up</text>

  <!-- feature chips -->
  <g font-family="'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif" font-size="17" font-weight="600">
    <rect x="322" y="208" width="176" height="38" rx="19" fill="#ffffff" opacity="0.10"/>
    <text x="410" y="233" fill="#ffd166" text-anchor="middle">⚡ 10-second scans</text>

    <rect x="510" y="208" width="186" height="38" rx="19" fill="#ffffff" opacity="0.10"/>
    <text x="603" y="233" fill="#7ee2a0" text-anchor="middle">📱 WhatsApp alerts</text>

    <rect x="708" y="208" width="204" height="38" rx="19" fill="#ffffff" opacity="0.10"/>
    <text x="810" y="233" fill="#8ecbff" text-anchor="middle">🎟️ New-show detection</text>
  </g>
</svg>
